services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: deadlist-backend
    ports:
      - "8000:8000"
    volumes:
      - deadlist-uploads:/app/uploads
      - deadlist-data:/app/data
      - deadlist-symbols:/opt/volatility3/volatility3/symbols
    environment:
      - MOCK_MODE=False
      - UPLOAD_DIR=/app/uploads
      - DATABASE_URL=sqlite+aiosqlite:////app/data/deadlist.db
      - CORS_ORIGINS=http://localhost:5173,http://localhost:3000
      - VOLATILITY_PATH=vol
      - PLUGIN_TIMEOUT_SECONDS=1800
      - MAX_UPLOAD_SIZE_GB=32
      - LOG_LEVEL=INFO
    restart: unless-stopped

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        - VITE_API_URL=http://localhost:8000/api
        - VITE_WS_URL=ws://localhost:8000
    container_name: deadlist-frontend
    ports:
      - "3000:80"
    depends_on:
      - backend
    restart: unless-stopped

volumes:
  deadlist-uploads:
  deadlist-data:
  deadlist-symbols:

